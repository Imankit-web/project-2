<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
  <title>Tic Tac Toe</title>
</head>
<body>
  <main>

    <div class="msg-container hide">
      <p id="msg">winner</p>
      <button class="newbtn">New Game</button>
      <p class="scroll-hint">Scrol down⬇ to View Game History</p>
    </div>
    
    <div class="draw-msg-container hide">
      <p id="msg-draw">Draw</p>
      <button class="newbtn">New Game</button>
      <p class="scroll-hint">scroll down⬇ to View Game History</p>
    </div>
    
    <h1>Tic Tac Toe</h1>

    <div class="container">
      <div class="gamebox">
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
      </div>
    </div>

    <button id="resetbtn">Reset</button>

  </main>

  <script src="script.js"></script>
</body>
</html>
